    <main>
        <h1> Start a Conversation </h1>
        
        <p>Connecting is always a pleasure, whether for projects, collaborations, or a simple greeting. Reach out through the form here or directly send me an email.</p>
        

        <div class="row g-4 layout">
            <div id="formFeedback" class="alert" role="alert" style="display: none;"></div>
            <!-- Image and Text Section -->

            <div class="col-md-6">
                <picture>
                    <source srcset="images/lets-talk2.jpeg" media="(max-width:800px)">
                    <img src="images/lets-talk1.jpeg" alt="background image" class="img-fluid rounded">
                </picture>
            </div>
                
        
               <!-- Form Section -->
               <div class="col-md-6 form-container">
                <form id="contactForm" action="https://formspree.io/f/mzzbqeve" method="post" enctype="multipart/form-data">
                    <!-- Form Fields -->
                    <div class="mb-2">
                        <label for="firstName" class="form-label">First Name:</label>
                        <input type="text" id="firstName" name="firstName" class="form-control" required>
                    </div>
                
                    <div class="mb-2">
                        <label for="lastName" class="form-label">Last Name:</label>
                        <input type="text" id="lastName" name="lastName" class="form-control" required>
                    </div>
                
                    <div class="mb-2">
                        <label for="message" class="form-label">Message:</label>
                        <textarea id="message" name="message" class="form-control" rows="3" required></textarea>
                    </div>
                
                    <div class="mb-4">
                        <label for="upload" class="form-label">Upload PDF/File:</label>
                        <input type="file" id="upload" name="upload" class="form-control" accept=".pdf,.doc,.docx">
                    </div>
                
                    <button type="submit" class="btn btn-primary w-100">Get in Touch</button>
                </form>
               
        </div>
